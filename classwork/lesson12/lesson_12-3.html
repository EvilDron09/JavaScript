<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>
<body>

<script>

    new Promise(resolve => {
        setTimeout(() => {
            let x = 1;
            console.log(x);
            resolve(x);
        }, 1000);
    })

    .then((x) =>{
        return new Promise(resolve => {
            setTimeout(() => {
                x++;
                console.log(x);
                resolve(x);
            }, 1000)
        })

    })

    .then((x) =>{
        return new Promise((resolve, reject) => {
            setTimeout(() => {
                x++;
                console.log(x);
                if(true){
                    reject('error')
                }else{
                resolve(x);
                }
            }, 1000)
        })

    })
        .catch(reason => {
            console.log(reason)
        })

</script>

</body>
</html>
